<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FORGE — Login</title>
<link rel="stylesheet" href="forge-shared.css">
<link rel="manifest" href="manifest.json">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--deep-bg); }
  .login-box { background:rgba(26,26,46,.9); border:2px solid var(--gold); border-radius:8px; padding:40px; max-width:360px; width:100%; text-align:center; }
  .login-box h1 { font-family:'Cinzel',serif; color:var(--gold); font-size:2rem; letter-spacing:.2em; margin-bottom:8px; }
  .login-box .sub { font-family:'Fira Code',monospace; color:var(--gold); opacity:.6; font-size:.75rem; margin-bottom:30px; }
  .login-box input { width:100%; padding:10px; margin-bottom:12px; background:var(--stone); border:1px solid var(--gold); border-radius:4px; color:var(--bone); font-family:'Fira Code',monospace; font-size:.85rem; }
  .login-box button { width:100%; padding:12px; background:var(--ember); border:none; border-radius:4px; color:var(--bone); font-family:'Cinzel',serif; font-size:1rem; letter-spacing:.1em; cursor:pointer; }
  .login-box button:hover { opacity:.85; }
  .login-error { color:var(--ember); font-size:.75rem; margin-top:8px; display:none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div class="login-box">
  <h1>THE FORGE</h1>
  <div class="sub">ENTER THE FORGE</div>
  <form onsubmit="doLogin(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">LOGIN</button>
  </form>
  <div class="login-error" id="login-error"></div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  } else {
    window.location.href = 'index.html';
  }
}
// If already logged in, redirect
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});
</script>
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }</script>
</body>
</html>
